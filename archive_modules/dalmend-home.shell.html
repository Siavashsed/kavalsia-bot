<main class="dh">
  <header class="dh-masthead">
    <div class="dh-masthead-row">
      <span class="dh-kicker">The Lookbook</span>
      <span class="dh-issue" id="aa-count">0 published</span>
    </div>
    <h1 class="dh-title">Spaces, Made&nbsp;Considered.</h1>
    <p class="dh-standfirst">An editorial archive of interiors, architecture and the art of living well, from __SITE_NAME__.</p>
    <div class="dh-rule"></div>
    <label class="dh-search-wrap">
      <svg class="dh-search-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="aa-search" class="dh-search" type="search" placeholder="Search the archive by title" aria-label="Search articles">
    </label>
    <nav class="dh-chips" id="aa-chips" aria-label="Filter by section">__CHIPS__</nav>
  </header>

  <section class="dh-featured" id="aa-latest" style="display:none">
    <div class="dh-featured-head">
      <span class="dh-eyebrow">In focus</span>
      <span class="dh-eyebrow-line"></span>
    </div>
    <div class="dh-featured-grid">
      <a class="dh-lead" id="aa-lead" href="#"></a>
      <div class="dh-edit-list" id="aa-sec-col"></div>
    </div>
  </section>

  <div class="dh-stream-head">
    <h2 class="dh-stream-title">The Collection</h2>
    <span class="dh-meta" id="aa-meta">Loading the archive...</span>
  </div>

  <div class="dh-grid" id="all-list"></div>

  <div class="dh-pager" id="aa-pager" style="display:none">
    <button id="aa-prev" type="button">&larr; Newer</button>
    <span id="aa-page-num">Page 1</span>
    <button id="aa-next" type="button">Older &rarr;</button>
  </div>
</main>
