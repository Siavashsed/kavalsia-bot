<main class="cpx">
  <header class="cpx-head">
    <div class="cpx-head-top">
      <span class="cpx-kicker">// THE ARCHIVE</span>
      <span class="cpx-live" id="aa-count">0 published</span>
    </div>
    <h1 class="cpx-title">All Signals</h1>
    <p class="cpx-sub">Every dispatch from __SITE_NAME__, newest first.</p>
    <label class="cpx-search-wrap">
      <span class="cpx-prompt">&gt;_</span>
      <input id="aa-search" class="cpx-search" type="search" placeholder="filter signals by title" aria-label="Search articles">
    </label>
    <div class="cpx-chips" id="aa-chips">__CHIPS__</div>
  </header>
  <section class="cpx-latest" id="aa-latest" style="display:none">
    <div class="cpx-latest-bar"><span class="cpx-latest-label">Latest dispatch</span><span class="cpx-blip"></span></div>
    <div class="cpx-latest-grid">
      <a class="cpx-lead" id="aa-lead" href="#"></a>
      <div class="cpx-seccol" id="aa-sec-col"></div>
    </div>
  </section>
  <div class="cpx-meta" id="aa-meta">Loading signals...</div>
  <div class="cpx-feed" id="all-list"></div>
  <div class="cpx-pager" id="aa-pager" style="display:none">
    <button id="aa-prev" type="button">&larr; Prev</button>
    <span id="aa-page-num">Page 1</span>
    <button id="aa-next" type="button">Next &rarr;</button>
  </div>
</main>
