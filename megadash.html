<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MegaDash - Kavalsia Network</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060a07;--bg2:#0b1209;--bg3:#101a12;--bg4:#162018;--bg5:#1c2a1e;
  --text:#ffffff;--text2:#b8d4c0;--text3:#4d7059;--text4:#2a3e2d;
  --accent:#3ecf8e;--accent2:#2eb87d;--glow:#3ecf8e1a;
  --green:#3ecf8e;--red:#ef4444;--amber:#f59e0b;--blue:#38bdf8;--purple:#a78bfa;--pink:#f472b6;
  --border:#0e1a10;--border2:#1a2e1e;--border3:#243828;
  --r:10px;--r2:14px;--font:'Inter',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;overflow:hidden}
body{background:radial-gradient(ellipse 80% 40% at 50% -10%,#0d2318 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 85% 60%,#0d1830 0%,transparent 60%),#060a07}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:4px}

/* LAYOUT */
.shell{display:grid;grid-template-rows:56px 1fr;height:100vh;overflow:hidden}

/* TOPBAR */
.topbar{background:rgba(11,18,9,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:12px;padding:0 24px;position:sticky;top:0;z-index:100}
.tb-back{display:flex;align-items:center;gap:5px;color:var(--text3);font-size:12px;font-weight:500;text-decoration:none;padding:5px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);transition:all .15s}
.tb-back:hover{color:var(--text);border-color:var(--border3);background:var(--bg4)}
.tb-logo{font-size:20px;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#3ecf8e 0%,#38bdf8 55%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.md-siaai-logo{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-right:4px;cursor:default}
.md-radar-wrap{position:relative;width:26px;height:26px;flex-shrink:0}
.md-radar-wrap .rc{position:absolute;border-radius:50%;border:1px solid #00ff4130}
.md-radar-wrap .rc1{inset:0;border-color:#00ff4145}
.md-radar-wrap .rc2{inset:6px;border-color:#00ff4130}
.md-radar-wrap .rc3{inset:11px;border-color:#00ff4120}
.md-radar-wrap .md-rsweep{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,transparent 0deg,#00ff4140 55deg,transparent 56deg);animation:mdRadarSpin 2s linear infinite}
.md-siaai-text{font-family:'Courier New',monospace;font-size:14px;font-weight:700;color:#00ff41;letter-spacing:3px;text-shadow:0 0 10px #00ff4199,0 0 20px #00ff4140;animation:mdHackBlink 2.4s step-end infinite}
.md-siaai-sub{font-family:monospace;font-size:8px;letter-spacing:2px;color:#00ff4160;text-transform:uppercase}
.tb-sub{font-size:11px;color:var(--text3);padding-left:2px;margin-left:-4px}
.tb-sep{width:1px;height:24px;background:var(--border2);flex-shrink:0}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.last-upd{font-size:11px;color:var(--text3)}

/* MODE TOGGLE */
.mode-wrap{display:flex;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.mode-btn{padding:5px 16px;font-size:12px;font-weight:700;border:none;cursor:pointer;background:none;color:var(--text3);transition:all .15s;font-family:var(--font)}
.mode-btn.demo-on{background:var(--amber);color:#000}
.mode-btn.live-on{background:var(--blue);color:#000}

/* REFRESH BTN */
.btn-ref{display:flex;align-items:center;gap:6px;padding:6px 14px;font-size:12px;font-weight:600;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font)}
.btn-ref:hover{background:var(--bg4);color:var(--text)}
.spin{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

/* MAIN */
.main{overflow-y:auto;padding:24px 28px 80px}

/* HERO STATS */
.hero{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.hcard{background:rgba(13,20,16,0.8);backdrop-filter:blur(8px);border:1px solid var(--border2);border-radius:var(--r2);padding:20px 22px;position:relative;overflow:hidden}
.hcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--hl,#3ecf8e40),transparent)}
.hcard.b::before{--hl:#38bdf840}.hcard.p::before{--hl:#a78bfa40}.hcard.a::before{--hl:#f59e0b40}
.hl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:8px}
.hv{font-size:32px;font-weight:900;letter-spacing:-1.5px;line-height:1}
.hs{font-size:11px;color:var(--text3);margin-top:6px}
.hbadge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;margin-top:6px}
.hbadge.g{background:#3ecf8e18;color:var(--green);border:1px solid #3ecf8e30}
.hbadge.b{background:#38bdf818;color:var(--blue);border:1px solid #38bdf830}
.hbadge.a{background:#f59e0b18;color:var(--amber);border:1px solid #f59e0b30}

/* FILTER BAR */
.fbar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.srch{position:relative;flex:1;min-width:180px;max-width:280px}
.srch input{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:7px 12px 7px 30px;font-size:13px;color:var(--text);width:100%;transition:border-color .15s;font-family:var(--font)}
.srch input:focus{border-color:var(--accent);outline:none}
.srch-ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.chips{display:flex;gap:6px}
.chip{padding:5px 12px;font-size:12px;font-weight:500;border-radius:100px;cursor:pointer;background:var(--bg3);border:1px solid var(--border2);color:var(--text3);transition:all .15s}
.chip:hover{color:var(--text);border-color:var(--border3)}
.chip.on{background:var(--glow);color:var(--accent);border-color:#3ecf8e40;font-weight:700}
.ssort{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--text2);cursor:pointer;font-family:var(--font)}
.ssort:focus{outline:none;border-color:var(--accent)}
.rcnt{font-size:12px;color:var(--text3);margin-left:auto}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}

/* SITE CARD */
.scard{background:rgba(13,20,16,0.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--border2);border-radius:var(--r2);padding:18px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;display:flex;flex-direction:column}
.scard:hover{border-color:var(--border3);background:rgba(18,27,20,0.9);transform:translateY(-1px);box-shadow:0 8px 32px rgba(0,0,0,.45)}
.scard.ac::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cl1,#3ecf8e),var(--cl2,#38bdf8))}
.sc-blue{--cl1:#38bdf8;--cl2:#60a5fa}.sc-green{--cl1:#3ecf8e;--cl2:#34d399}.sc-purple{--cl1:#a78bfa;--cl2:#c084fc}
.sc-amber{--cl1:#f59e0b;--cl2:#fbbf24}.sc-pink{--cl1:#f472b6;--cl2:#e879f9}.sc-red{--cl1:#ef4444;--cl2:#f87171}

.chead{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:12px}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cdot.active{background:var(--green);box-shadow:0 0 6px #3ecf8e55;animation:pulse 2s infinite}
.cdot.warming{background:var(--amber)}
.cdot.paused{background:var(--text4)}
.cstat-row{display:flex;align-items:center;gap:6px}
.cstatus{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.cstatus.active{color:var(--green)}.cstatus.warming{color:var(--amber)}.cstatus.paused{color:var(--text3)}
.ccat{font-size:10px;font-weight:600;padding:3px 8px;border-radius:100px;background:var(--bg5);color:var(--text3);border:1px solid var(--border2);white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis}
.cname{font-size:16px;font-weight:800;letter-spacing:-.3px;line-height:1.2;margin-bottom:3px}
.cdomain{font-size:11px;color:var(--text3);font-family:monospace;margin-bottom:14px}
.cdiv{height:1px;background:var(--border2);margin-bottom:12px}
.cstats{display:flex;gap:18px;margin-bottom:14px}
.cst{display:flex;flex-direction:column;gap:1px}
.cst-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:500}
.cst-val{font-size:15px;font-weight:800}
.cst-sub{font-size:10px;font-weight:700}
.cst-sub.up{color:var(--green)}.cst-sub.down{color:var(--red)}.cst-sub.flat{color:var(--text2)}
.spark-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:500;margin-bottom:4px}
.spark-svg{width:100%;height:40px;display:block}
.cfoot{margin-top:auto;padding-top:12px;border-top:1px solid var(--border2)}
.clat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.clat-title{font-size:12px;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cbtns{display:flex;gap:8px;margin-top:12px}
.cbtn{flex:1;padding:7px;font-size:11px;font-weight:700;border-radius:7px;border:1px solid var(--border2);background:var(--bg4);color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px}
.cbtn:hover{background:var(--bg5);color:var(--text);border-color:var(--border3)}
.cbtn.pr{background:#3ecf8e18;color:var(--green);border-color:#3ecf8e30}
.cbtn.pr:hover{background:#3ecf8e28;border-color:#3ecf8e50}

/* OVERLAY / MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(6,10,7,.88);backdrop-filter:blur(5px);z-index:1000;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:520px;max-width:100%;max-height:88vh;overflow-y:auto;padding:28px;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.7)}
.m-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);color:var(--text3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.m-close:hover{background:var(--bg4);color:var(--text)}
.m-top{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:5px}
.m-title{font-size:22px;font-weight:900;letter-spacing:-.4px;margin-bottom:2px}
.m-domain{font-size:12px;color:var(--text3);font-family:monospace;margin-bottom:18px}
.m-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:0}
.mst{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;flex:1;min-width:80px}
.mst-lbl{font-size:10px;color:var(--text3);font-weight:500}
.mst-val{font-size:20px;font-weight:800}
.mdiv{height:1px;background:var(--border2);margin:16px 0}
.m-slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.mbadge-demo{font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;background:#f59e0b18;color:var(--amber);border:1px solid #f59e0b30}
.mbadge-live{font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;background:#38bdf818;color:var(--blue);border:1px solid #38bdf830}
.lat-box{background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:12px 14px}
.lat-ttl{font-size:13px;font-weight:700;line-height:1.4}
.lat-dt{font-size:11px;color:var(--text3);margin-top:3px}
.sum-box{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:16px;font-size:13px;line-height:1.75;color:var(--text2);min-height:80px}
.sum-gen{display:flex;align-items:center;gap:8px;color:var(--text3);font-size:13px}

/* EMPTY */
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text3)}
</style>
</head>
<body>

<!-- ════════ LOGIN WALL ════════ -->
<div id="auth-wall" style="position:fixed;inset:0;z-index:99999;background:#050a06;display:flex;align-items:center;justify-content:center">
  <div style="background:#0d1410;border:1px solid #1e3024;border-radius:16px;padding:48px 40px;width:360px;text-align:center;box-shadow:0 0 60px #3ecf8e1e">
    <div style="font-size:24px;font-weight:800;margin-bottom:4px;font-family:'Courier New',monospace;color:#00ff41;text-shadow:0 0 14px #00ff4180">KAVALSIA NETWORK</div>
    <div style="font-size:13px;color:#b8d4c0;margin-bottom:32px">Secure Access</div>
    <input id="auth-user" type="text" placeholder="Username" autocomplete="username"
      style="width:100%;padding:12px 16px;background:#121b14;border:1px solid #1e3024;border-radius:8px;color:#ffffff;font-size:14px;margin-bottom:10px;outline:none;box-sizing:border-box"
      onkeydown="if(event.key==='Enter')attemptLogin()">
    <input id="auth-pass" type="password" placeholder="Password" autocomplete="current-password"
      style="width:100%;padding:12px 16px;background:#121b14;border:1px solid #1e3024;border-radius:8px;color:#ffffff;font-size:14px;margin-bottom:20px;outline:none;box-sizing:border-box"
      onkeydown="if(event.key==='Enter')attemptLogin()">
    <button onclick="attemptLogin()" style="width:100%;padding:13px;background:linear-gradient(135deg,#3ecf8e,#2eb87d);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer">Sign In</button>
    <div id="auth-err" style="margin-top:12px;font-size:13px;color:#ef4444;display:none">Invalid credentials.</div>
  </div>
</div>
<script>
(function(){
  var U='admin',P='2020dalmenD',K='kvs_net_auth';
  function chk(){var ok=sessionStorage.getItem(K)==='1';document.getElementById('auth-wall').style.display=ok?'none':'flex';}
  window.attemptLogin=function(){
    var u=document.getElementById('auth-user').value,p=document.getElementById('auth-pass').value;
    if(u===U&&p===P){sessionStorage.setItem(K,'1');document.getElementById('auth-wall').style.display='none';}
    else{document.getElementById('auth-err').style.display='block';}
  };
  chk();
})();
</script>

<div id="preloader" style="position:fixed;inset:0;background:#000;z-index:99999;display:flex;align-items:center;justify-content:center;transition:opacity .6s ease">
  <canvas id="preMatrix" style="position:absolute;inset:0;width:100%;height:100%;opacity:.3"></canvas>
  <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:10px">
    <!-- radar -->
    <div style="position:relative;width:120px;height:120px;margin-bottom:8px">
      <div style="position:absolute;inset:0;border-radius:50%;border:1px solid #00ff4145"></div>
      <div style="position:absolute;inset:20px;border-radius:50%;border:1px solid #00ff4135"></div>
      <div style="position:absolute;inset:40px;border-radius:50%;border:1px solid #00ff4125"></div>
      <div style="position:absolute;inset:56px;border-radius:50%;border:1px solid #00ff4140"></div>
      <div style="position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,transparent 0deg,#00ff4125 60deg,#00ff4108 90deg,transparent 91deg);animation:mdRadarSpin 2s linear infinite"></div>
      <div style="position:absolute;left:0;right:0;top:50%;height:1px;background:#00ff4115;transform:translateY(-50%)"></div>
      <div style="position:absolute;top:0;bottom:0;left:50%;width:1px;background:#00ff4115;transform:translateX(-50%)"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;border-radius:50%;background:#00ff41;box-shadow:0 0 8px #00ff41"></div>
      <div style="position:absolute;top:18%;left:62%;width:4px;height:4px;border-radius:50%;background:#00ff41;box-shadow:0 0 6px #00ff41;animation:mdBlip 2s .3s ease-in-out infinite"></div>
      <div style="position:absolute;top:55%;left:25%;width:4px;height:4px;border-radius:50%;background:#00ff41;box-shadow:0 0 6px #00ff41;animation:mdBlip 2s 1.1s ease-in-out infinite"></div>
      <div style="position:absolute;top:70%;left:68%;width:4px;height:4px;border-radius:50%;background:#00ff41;box-shadow:0 0 6px #00ff41;animation:mdBlip 2s .7s ease-in-out infinite"></div>
    </div>
    <div style="font-family:'Courier New',monospace;font-size:22px;font-weight:700;letter-spacing:4px;color:#00ff41;text-shadow:0 0 20px #00ff4199,0 0 40px #00ff4140;animation:mdHackBlink 2.4s step-end infinite">KAVALSIA</div>
    <div style="font-family:monospace;font-size:9px;letter-spacing:4px;color:#00ff4160;text-transform:uppercase;margin-top:-4px">// NETWORK</div>
    <div style="width:180px;height:1px;background:#00ff4115;margin-top:6px;overflow:hidden"><div id="preBar" style="height:100%;width:0;background:#00ff41;box-shadow:0 0 8px #00ff41;transition:width .3s ease"></div></div>
    <div id="preStatus" style="font-family:monospace;font-size:9px;letter-spacing:2px;color:#00ff4150;margin-top:4px">INITIALIZING NETWORK...</div>
  </div>
</div>
<style>
@keyframes mdRadarSpin{to{transform:rotate(360deg)}}
@keyframes mdBlip{0%,100%{opacity:0;transform:scale(.5)}30%,70%{opacity:1;transform:scale(1)}}
@keyframes mdHackBlink{0%,90%,100%{opacity:1}92%,98%{opacity:.2}}
</style>
<script>
(function(){
  const canvas=document.getElementById('preMatrix'),ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const cols=Math.floor(canvas.width/16),drops=Array(cols).fill(1);
  const chars='アイウエオカキクケコ0123456789ABCDEF<>{}[]/\\';
  function draw(){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.font='14px monospace';drops.forEach((y,i)=>{ctx.fillStyle=i%3===0?'#3ecf8e':'#00ff4160';ctx.fillText(chars[Math.floor(Math.random()*chars.length)],i*16,y*16);if(y*16>canvas.height&&Math.random()>.975)drops[i]=0;drops[i]++;});}
  const mt=setInterval(draw,50);
  const bar=document.getElementById('preBar'),status=document.getElementById('preStatus');
  const msgs=['LOADING MEGA DASH...','FETCHING 22 SITES...','BUILDING NETWORK...','READY'];
  let pct=0,mi=0;
  const bt=setInterval(()=>{pct=Math.min(pct+Math.random()*18+4,100);bar.style.width=pct+'%';const ni=Math.min(Math.floor(pct/33),msgs.length-1);if(ni!==mi){mi=ni;status.textContent=msgs[mi];}if(pct>=100){clearInterval(bt);clearInterval(mt);status.textContent='READY';setTimeout(()=>{const p=document.getElementById('preloader');p.style.opacity='0';setTimeout(()=>p.remove(),700);},400);}},120);
})();
</script>
<div class="shell">

  <div class="topbar">
    <a href="/" class="tb-back">← Hub</a>
    <div class="tb-sep"></div>
    <div class="md-siaai-logo">
      <div class="md-radar-wrap">
        <div class="rc rc1"></div><div class="rc rc2"></div><div class="rc rc3"></div>
        <div class="md-rsweep"></div>
      </div>
      <div style="display:flex;flex-direction:column;line-height:1.2">
        <span class="md-siaai-text">KAVALSIA</span>
        <span class="md-siaai-sub">NETWORK</span>
      </div>
    </div>
    <div class="tb-right">
      <span class="last-upd" id="lastUpd"></span>
      <input id="ghTokenIn" type="password" placeholder="GitHub token (ghp_...)"
        style="padding:5px 10px;font-size:11px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text2);outline:none;width:160px"
        oninput="localStorage.setItem('ghToken',this.value)"
        title="Paste your GitHub Personal Access Token to load live article data">
      <button onclick="triggerBotRun()" id="btnRun"
        style="padding:6px 12px;font-size:12px;font-weight:600;background:#f59e0b22;border:1px solid #f59e0b88;border-radius:7px;color:var(--amber);cursor:pointer"
        title="Trigger GitHub Actions bot run now">⚡ Run Bot</button>

// ── sparkline ────────────────────────────────────
function spark(data, hex) {
  const W=280,H=40,P=4;
  const mn=Math.min(...data), mx=Math.max(...data), rng=mx-mn||1;
  const pts = data.map((v,i)=>{
    const x = P + (i/(data.length-1))*(W-P*2);
    const y = H-P - ((v-mn)/rng)*(H-P*2);
    return [+x.toFixed(1), +y.toFixed(1)];
  });
  const poly = pts.map(p=>p.join(',')).join(' ');
  const uid  = 'sg'+Math.random().toString(36).slice(2,9);
  const [lx,ly] = pts[pts.length-1];
  const [fx]    = pts[0];
  const fill    = poly+` ${lx},${H} ${fx},${H}`;
  return `<svg class="spark-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
  <defs><linearGradient id="${uid}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="${hex}" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="${hex}" stop-opacity="0.02"/>
  </linearGradient></defs>
  <polygon points="${fill}" fill="url(#${uid})"/>
  <polyline points="${poly}" fill="none" stroke="${hex}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="${lx}" cy="${ly}" r="3" fill="${hex}"/>
</svg>`;
}

// ── filter / sort ─────────────────────────────────
function applyFilters() {
  const q    = document.getElementById('srchIn').value.toLowerCase();
  const sort = document.getElementById('sortSel').value;
  let list   = allSites.filter(s=>{
    if (activeFilter!=='all' && s.status!==activeFilter) return false;
    if (q && !s.name.toLowerCase().includes(q) && !s.domain.toLowerCase().includes(q) && !s.cat.toLowerCase().includes(q)) return false;
    return true;
  });
  if (sort==='traffic')  list.sort((a,b)=>b.t7.reduce((x,y)=>x+y,0)-a.t7.reduce((x,y)=>x+y,0));
  if (sort==='articles') list.sort((a,b)=>b.arts-a.arts);
  if (sort==='name')     list.sort((a,b)=>a.name.localeCompare(b.name));
  document.getElementById('rcnt').textContent = `${list.length} site${list.length!==1?'s':''}`;
  const g = document.getElementById('grid');
  g.innerHTML = list.length ? list.map(card).join('') : '<div class="empty">No sites match your filters</div>';
}

function setFilter(f) {
  activeFilter = f;

async function liveSummary(s) {
  document.getElementById('mSum').innerHTML = `<div class="sum-gen"><span class="spin">⟳</span>Generating…</div>`;
  try {
    const r = await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:300,
        messages:[{role:'user',content:`Write a 3-sentence performance summary for a content site called "${s.name}" (${s.domain}), niche: ${s.cat}. It has ${s.arts} articles. Latest article: "${s.latestTitle}". 7-day traffic: ${s.t7.reduce((a,b)=>a+b,0)} views. Status: ${s.status}. Be specific and actionable. No intro fluff.`}]})});
    const d = await r.json();
    const t = d?.content?.[0]?.text || d?.error?.message || 'Could not generate summary.';
    document.getElementById('mSum').innerHTML = `<p>${t}</p>`;
  } catch(e) {
    document.getElementById('mSum').innerHTML = `<p style="color:var(--text3)">Error: ${e.message}</p>`;
  }
}

async function triggerBotRun() {
  const tok = localStorage.getItem('ghToken') || document.getElementById('ghTokenIn').value.trim();
  if (!tok) { alert('Paste your GitHub token in the field first.'); return; }
  const btn = document.getElementById('btnRun');
  btn.textContent = '⏳ Triggering…'; btn.disabled = true;
  try {
    const r = await fetch('https://api.github.com/repos/Siavashsed/kavalsia-bot/actions/workflows/daily-post.yml/dispatches', {
      method: 'POST',
      headers: { 'Authorization': `token ${tok}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ ref: 'main' })
    });
    if (r.status === 204) {
      btn.textContent = '✓ Triggered!'; btn.style.background='#3ecf8e22'; btn.style.borderColor='#3ecf8e88'; btn.style.color='var(--green)';
      setTimeout(() => { btn.textContent='⚡ Run Bot'; btn.style=''; btn.disabled=false; }, 4000);
    } else {
      const err = await r.json().catch(()=>({}));
      alert('Error ' + r.status + ': ' + (err.message||'Check token has workflow scope'));
      btn.textContent='⚡ Run Bot'; btn.disabled=false;
    }
  } catch(e) { alert('Network error: ' + e.message); btn.textContent='⚡ Run Bot'; btn.disabled=false; }
}

  }
  const ghTok = localStorage.getItem('ghToken');

  // Load config from server if available, otherwise use DEMO site list
  let siteCfg = DEMO;
  try {
    const cfgR = await fetch('/api/config', {signal: AbortSignal.timeout(2000)}).catch(()=>null);
    if (cfgR && cfgR.ok) {
      const cfg = await cfgR.json();
      if (cfg.sites?.length) siteCfg = cfg.sites;
    }
  } catch(_) {}

  const colors = ['blue','green','purple','amber','pink','red'];

  return Promise.all(siteCfg.map(async (s, idx) => {
    let arts = 0, latest = '-', latestDate = '-', latestTitle = 'No articles yet';
    const repo = s.repo || (DEMO.find(d=>d.id===s.id)||{}).id;

    if (ghTok && repo && !repo.includes('YOUR')) {
      try {
        const r = await fetch(`https://api.github.com/repos/${repo}/contents/articles.json`, {
          headers: { 'Authorization': `token ${ghTok}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (r.ok) {
          const data = await r.json();
          const decoded = JSON.parse(atob(data.content.replace(/\n/g,'')));
          if (Array.isArray(decoded) && decoded.length) {
            arts = decoded.length;
            const newest = decoded.sort((a,b) => (b.date_iso||b.date||'').localeCompare(a.date_iso||a.date||''))[0];
            latestTitle = newest.title || '-';
            latestDate  = newest.date  || newest.date_iso || '-';
            latest      = newest.date_iso ? timeAgo(newest.date_iso) : '-';
          } else {
            latestTitle = 'No articles yet';
          }
        } else if (r.status === 404) {
          latestTitle = 'Repo empty - not published yet';
        }
      } catch(e) { latestTitle = 'Could not load'; }
    }

    const base = DEMO.find(d => d.id === s.id) || {};
    const t7 = arts > 0
      ? Array.from({length:7}, (_,i) => Math.floor(arts * 12 + arts * (6-i)))
      : [0,0,0,0,0,0,0];

    return {
      id: s.id,
      name: base.name || s.id.split('-').map(w=>w[0].toUpperCase()+w.slice(1)).join(' '),
      domain: s.domain || base.domain || s.id,
      cat: s.category || base.cat || '-',
      status: arts > 0 ? 'active' : 'warming',
      arts, latest, latestDate, latestTitle,
      t7,
      trend: arts > 0 ? '+live' : '-',
      tdir: arts > 0 ? 'up' : 'flat',
      sum: base.sum || null,
      color:colors[Math.abs(s.id.split('').reduce((a,c)=>a+c.charCodeAt(0),0))%6]
    };
  }));
}

// ── helpers ───────────────────────────────────────
function timeAgo(isoDate) {
  if (!isoDate || isoDate === '-') return '-';
  const diff = Date.now() - new Date(isoDate).getTime();
  const h = Math.floor(diff / 3600000);
  if (h < 1)  return 'just now';
  if (h < 24) return h + 'h ago';
  const d = Math.floor(h / 24);
  if (d < 30) return d + 'd ago';
  return Math.floor(d/30) + 'mo ago';
}

            <button onclick="mdTermNew()" style="font-size:11px;background:#3ecf8e18;color:#3ecf8e;border:1px solid #3ecf8e30;border-radius:5px;padding:2px 8px;cursor:pointer">+</button>
          </div>
          <div id="mdTermHist" style="flex:1;overflow-y:auto;padding:6px"></div>
        </div>
        <div style="display:flex;flex-direction:column;background:#060a07">
          <div id="mdTermMsgs" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column"></div>
          <div style="padding:10px 12px;border-top:1px solid #1a2e1e;background:#0b1209">
            <div style="display:flex;gap:8px">
              <textarea id="mdTermIn" placeholder="Ask AI[S] anything…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();mdTermSend()}" style="flex:1;resize:none;height:40px;background:#101a12;border:1px solid #1a2e1e;border-radius:8px;padding:9px 12px;color:#fff;font-size:13px;line-height:1.5;outline:none"></textarea>
              <button onclick="mdTermSend()" style="padding:9px 18px;background:#3ecf8e;color:#000;font-weight:700;border:none;border-radius:8px;cursor:pointer;white-space:nowrap">Send</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) mdFabClose(); });
  document.body.appendChild(overlay);
})();

function mdFabOpen() {
  document.getElementById('md-fab-overlay').style.display = 'block';
  document.body.style.overflow = 'hidden';
  if (!mdTermCurrent) mdTermNew();
  mdTRM(); mdTRH();
  setTimeout(() => { const inp = document.getElementById('mdTermIn'); if (inp) inp.focus(); }, 100);
}
function mdFabClose() {
  document.getElementById('md-fab-overlay').style.display = 'none';
  document.body.style.overflow = '';
}
</script>
</body>
</html>
