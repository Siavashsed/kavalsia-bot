<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060a07;--bg2:#0b1209;--bg3:#101a12;--bg4:#162018;--bg5:#1c2a1e;
  --text:#ffffff;--text2:#b8d4c0;--text3:#4d7059;--text4:#2a3e2d;
  --accent:#3ecf8e;--accent2:#2eb87d;--glow:#3ecf8e1a;
  --green:#3ecf8e;--red:#ef4444;--amber:#f59e0b;--blue:#38bdf8;--purple:#a78bfa;--pink:#f472b6;
  --border:#0e1a10;--border2:#1a2e1e;--border3:#243828;
  --r:10px;--r2:14px;--font:'Inter',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;overflow:hidden}
body{background:radial-gradient(ellipse 80% 40% at 50% -10%,#0d2318 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 85% 60%,#0d1830 0%,transparent 60%),#060a07}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:4px}

/* LAYOUT */
.shell{display:grid;grid-template-rows:56px 1fr;height:100vh;overflow:hidden}

/* TOPBAR */
.topbar{background:rgba(11,18,9,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:12px;padding:0 24px;position:sticky;top:0;z-index:100}
.tb-back{display:flex;align-items:center;gap:5px;color:var(--text3);font-size:12px;font-weight:500;text-decoration:none;padding:5px 10px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);transition:all .15s}
.tb-back:hover{color:var(--text);border-color:var(--border3);background:var(--bg4)}
.tb-logo{font-size:20px;font-weight:900;letter-spacing:-0.5px;background:linear-gradient(135deg,#3ecf8e 0%,#38bdf8 55%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tb-sub{font-size:11px;color:var(--text3);padding-left:2px;margin-left:-4px}
.tb-sep{width:1px;height:24px;background:var(--border2);flex-shrink:0}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.last-upd{font-size:11px;color:var(--text3)}

/* MODE TOGGLE */
.mode-wrap{display:flex;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.mode-btn{padding:5px 16px;font-size:12px;font-weight:700;border:none;cursor:pointer;background:none;color:var(--text3);transition:all .15s;font-family:var(--font)}
.mode-btn.demo-on{background:var(--amber);color:#000}
.mode-btn.live-on{background:var(--blue);color:#000}

/* REFRESH BTN */
.btn-ref{display:flex;align-items:center;gap:6px;padding:6px 14px;font-size:12px;font-weight:600;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font)}
.btn-ref:hover{background:var(--bg4);color:var(--text)}
.spin{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

/* MAIN */
.main{overflow-y:auto;padding:24px 28px 80px}

/* HERO STATS */
.hero{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.hcard{background:rgba(13,20,16,0.8);backdrop-filter:blur(8px);border:1px solid var(--border2);border-radius:var(--r2);padding:20px 22px;position:relative;overflow:hidden}
.hcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--hl,#3ecf8e40),transparent)}
.hcard.b::before{--hl:#38bdf840}.hcard.p::before{--hl:#a78bfa40}.hcard.a::before{--hl:#f59e0b40}
.hl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:8px}
.hv{font-size:32px;font-weight:900;letter-spacing:-1.5px;line-height:1}
.hs{font-size:11px;color:var(--text3);margin-top:6px}
.hbadge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;margin-top:6px}
.hbadge.g{background:#3ecf8e18;color:var(--green);border:1px solid #3ecf8e30}
.hbadge.b{background:#38bdf818;color:var(--blue);border:1px solid #38bdf830}
.hbadge.a{background:#f59e0b18;color:var(--amber);border:1px solid #f59e0b30}

/* FILTER BAR */
.fbar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.srch{position:relative;flex:1;min-width:180px;max-width:280px}
.srch input{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:7px 12px 7px 30px;font-size:13px;color:var(--text);width:100%;transition:border-color .15s;font-family:var(--font)}
.srch input:focus{border-color:var(--accent);outline:none}
.srch-ic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.chips{display:flex;gap:6px}
.chip{padding:5px 12px;font-size:12px;font-weight:500;border-radius:100px;cursor:pointer;background:var(--bg3);border:1px solid var(--border2);color:var(--text3);transition:all .15s}
.chip:hover{color:var(--text);border-color:var(--border3)}
.chip.on{background:var(--glow);color:var(--accent);border-color:#3ecf8e40;font-weight:700}
.ssort{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--text2);cursor:pointer;font-family:var(--font)}
.ssort:focus{outline:none;border-color:var(--accent)}
.rcnt{font-size:12px;color:var(--text3);margin-left:auto}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}

/* SITE CARD */
.scard{background:rgba(13,20,16,0.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--border2);border-radius:var(--r2);padding:18px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;display:flex;flex-direction:column}
.scard:hover{border-color:var(--border3);background:rgba(18,27,20,0.9);transform:translateY(-1px);box-shadow:0 8px 32px rgba(0,0,0,.45)}
.scard.ac::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cl1,#3ecf8e),var(--cl2,#38bdf8))}
.sc-blue{--cl1:#38bdf8;--cl2:#60a5fa}.sc-green{--cl1:#3ecf8e;--cl2:#34d399}.sc-purple{--cl1:#a78bfa;--cl2:#c084fc}
.sc-amber{--cl1:#f59e0b;--cl2:#fbbf24}.sc-pink{--cl1:#f472b6;--cl2:#e879f9}.sc-red{--cl1:#ef4444;--cl2:#f87171}

.chead{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:12px}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cdot.active{background:var(--green);box-shadow:0 0 6px #3ecf8e55;animation:pulse 2s infinite}
.cdot.warming{background:var(--amber)}
.cdot.paused{background:var(--text4)}
.cstat-row{display:flex;align-items:center;gap:6px}
.cstatus{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.cstatus.active{color:var(--green)}.cstatus.warming{color:var(--amber)}.cstatus.paused{color:var(--text3)}
.ccat{font-size:10px;font-weight:600;padding:3px 8px;border-radius:100px;background:var(--bg5);color:var(--text3);border:1px solid var(--border2);white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis}
.cname{font-size:16px;font-weight:800;letter-spacing:-.3px;line-height:1.2;margin-bottom:3px}
.cdomain{font-size:11px;color:var(--text3);font-family:monospace;margin-bottom:14px}
.cdiv{height:1px;background:var(--border2);margin-bottom:12px}
.cstats{display:flex;gap:18px;margin-bottom:14px}
.cst{display:flex;flex-direction:column;gap:1px}
.cst-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:500}
.cst-val{font-size:15px;font-weight:800}
.cst-sub{font-size:10px;font-weight:700}
.cst-sub.up{color:var(--green)}.cst-sub.down{color:var(--red)}.cst-sub.flat{color:var(--text2)}
.spark-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:500;margin-bottom:4px}
.spark-svg{width:100%;height:40px;display:block}
.cfoot{margin-top:auto;padding-top:12px;border-top:1px solid var(--border2)}
.clat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.clat-title{font-size:12px;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cbtns{display:flex;gap:8px;margin-top:12px}
.cbtn{flex:1;padding:7px;font-size:11px;font-weight:700;border-radius:7px;border:1px solid var(--border2);background:var(--bg4);color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px}
.cbtn:hover{background:var(--bg5);color:var(--text);border-color:var(--border3)}
.cbtn.pr{background:#3ecf8e18;color:var(--green);border-color:#3ecf8e30}
.cbtn.pr:hover{background:#3ecf8e28;border-color:#3ecf8e50}

/* OVERLAY / MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(6,10,7,.88);backdrop-filter:blur(5px);z-index:1000;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:520px;max-width:100%;max-height:88vh;overflow-y:auto;padding:28px;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.7)}
.m-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);color:var(--text3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.m-close:hover{background:var(--bg4);color:var(--text)}
.m-top{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:5px}
.m-title{font-size:22px;font-weight:900;letter-spacing:-.4px;margin-bottom:2px}
.m-domain{font-size:12px;color:var(--text3);font-family:monospace;margin-bottom:18px}
.m-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:0}
.mst{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;flex:1;min-width:80px}
.mst-lbl{font-size:10px;color:var(--text3);font-weight:500}
.mst-val{font-size:20px;font-weight:800}
.mdiv{height:1px;background:var(--border2);margin:16px 0}
.m-slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.mbadge-demo{font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;background:#f59e0b18;color:var(--amber);border:1px solid #f59e0b30}
.mbadge-live{font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;background:#38bdf818;color:var(--blue);border:1px solid #38bdf830}
.lat-box{background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:12px 14px}
.lat-ttl{font-size:13px;font-weight:700;line-height:1.4}
.lat-dt{font-size:11px;color:var(--text3);margin-top:3px}
.sum-box{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:16px;font-size:13px;line-height:1.75;color:var(--text2);min-height:80px}
.sum-gen{display:flex;align-items:center;gap:8px;color:var(--text3);font-size:13px}

/* EMPTY */
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text3)}
</style>
</head>

      <span class="rcnt" id="rcnt"></span>
    </div>

    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="maybeClose(event)">

// ── sparkline ────────────────────────────────────
function spark(data, hex) {
  const W=280,H=40,P=4;
  const mn=Math.min(...data), mx=Math.max(...data), rng=mx-mn||1;
  const pts = data.map((v,i)=>{
    const x = P + (i/(data.length-1))*(W-P*2);
    const y = H-P - ((v-mn)/rng)*(H-P*2);
    return [+x.toFixed(1), +y.toFixed(1)];
  });
  const poly = pts.map(p=>p.join(',')).join(' ');
  const uid  = 'sg'+Math.random().toString(36).slice(2,9);
  const [lx,ly] = pts[pts.length-1];
  const [fx]    = pts[0];
  const fill    = poly+` ${lx},${H} ${fx},${H}`;
  return `<svg class="spark-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
  <defs><linearGradient id="${uid}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="${hex}" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="${hex}" stop-opacity="0.02"/>
  </linearGradient></defs>
  <polygon points="${fill}" fill="url(#${uid})"/>
  <polyline points="${poly}" fill="none" stroke="${hex}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="${lx}" cy="${ly}" r="3" fill="${hex}"/>
</svg>`;
}

// ── hero stats ───────────────────────────────────
function renderHero(sites) {
  const arts   = sites.reduce((s,x)=>s+x.arts,0);
  const traf   = sites.reduce((s,x)=>s+x.t7.reduce((a,b)=>a+b,0),0);
  const active = sites.filter(x=>x.status==='active').length;
  const warm   = sites.filter(x=>x.status==='warming').length;
  const paused = sites.filter(x=>x.status==='paused').length;
  const health = Math.round(((active+warm*.5)/sites.length)*100);
  document.getElementById('hSites').textContent    = sites.length;
  document.getElementById('hSitesSub').textContent = `${active} active · ${warm} warming · ${paused} paused`;
  document.getElementById('hArt').textContent      = arts.toLocaleString();
  document.getElementById('hArtBadge').textContent = `avg ${Math.round(arts/sites.length)} per site`;
  document.getElementById('hTraf').textContent     = traf.toLocaleString();
  document.getElementById('hTrafBadge').textContent= '↑ week on week';
  document.getElementById('hHealth').textContent   = health+'%';
  document.getElementById('hHealthSub').textContent= `${active} fully active`;
}

// ── card ─────────────────────────────────────────
function card(s) {
  const hex  = HEX[s.color]||'#3ecf8e';
  const tot  = s.t7.reduce((a,b)=>a+b,0).toLocaleString();
  const tc   = s.tdir==='up'?'up':s.tdir==='down'?'down':'flat';
  return `<div class="scard ${s.status==='active'?'ac':''} ${SCH[s.color]||''}" onclick="openModal('${s.id}')">
  <div class="chead">
    <div class="cstat-row"><span class="cdot ${s.status}"></span><span class="cstatus ${s.status}">${s.status}</span></div>
    <span class="ccat" title="${s.cat}">${s.cat}</span>
  </div>
  <div class="cname">${s.name}</div>
  <div class="cdomain">${s.domain}</div>
  <div class="cdiv"></div>
  <div class="cstats">
    <div class="cst"><span class="cst-lbl">Articles</span><span class="cst-val">${s.arts}</span></div>
    <div class="cst"><span class="cst-lbl">Latest</span><span class="cst-val" style="font-size:13px">${s.latest}</span></div>
    <div class="cst"><span class="cst-lbl">7d Views</span><span class="cst-val">${tot}</span><span class="cst-sub ${tc}">${s.trend}</span></div>
  </div>
  <div class="spark-lbl">Traffic · last 7 days</div>
  ${spark(s.t7, hex)}
  <div class="cfoot">
    <div class="clat-lbl">Latest Article</div>
    <div class="clat-title">${s.latestTitle}</div>
    <div class="cbtns">
      <button class="cbtn pr" onclick="event.stopPropagation();openModal('${s.id}')">✦ Summary</button>
      <button class="cbtn" onclick="event.stopPropagation();window.open('https://${s.domain}','_blank')">↗ Visit</button>
    </div>
  </div>
</div>`;
}

// ── filter / sort ─────────────────────────────────
function applyFilters() {
  const q    = document.getElementById('srchIn').value.toLowerCase();
  const sort = document.getElementById('sortSel').value;
  let list   = allSites.filter(s=>{
    if (activeFilter!=='all' && s.status!==activeFilter) return false;
    if (q && !s.name.toLowerCase().includes(q) && !s.domain.toLowerCase().includes(q) && !s.cat.toLowerCase().includes(q)) return false;
    return true;
  });
  if (sort==='traffic')  list.sort((a,b)=>b.t7.reduce((x,y)=>x+y,0)-a.t7.reduce((x,y)=>x+y,0));
  if (sort==='articles') list.sort((a,b)=>b.arts-a.arts);
  if (sort==='name')     list.sort((a,b)=>a.name.localeCompare(b.name));
  document.getElementById('rcnt').textContent = `${list.length} site${list.length!==1?'s':''}`;
  const g = document.getElementById('grid');
  g.innerHTML = list.length ? list.map(card).join('') : '<div class="empty">No sites match your filters</div>';
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.f===f));
  applyFilters();
}

// ── modal ─────────────────────────────────────────
function openModal(id) {
  const s = allSites.find(x=>x.id===id); if(!s) return;
  const hex = HEX[s.color]||'#3ecf8e';
  const tot = s.t7.reduce((a,b)=>a+b,0);
  document.getElementById('mTop').textContent    = s.cat;
  document.getElementById('mTitle').textContent  = s.name;
  document.getElementById('mDomain').textContent = s.domain;
  document.getElementById('mStats').innerHTML = `
    <div class="mst"><div class="mst-lbl">Articles</div><div class="mst-val" style="color:${hex}">${s.arts}</div></div>
    <div class="mst"><div class="mst-lbl">7-Day Views</div><div class="mst-val" style="color:${hex}">${tot.toLocaleString()}</div></div>
    <div class="mst"><div class="mst-lbl">Trend</div><div class="mst-val" style="color:${s.tdir==='up'?'#3ecf8e':s.tdir==='down'?'#ef4444':'#b8d4c0'}">${s.trend}</div></div>
    <div class="mst"><div class="mst-lbl">Status</div><div class="mst-val" style="font-size:14px;text-transform:capitalize">${s.status}</div></div>`;
  document.getElementById('mLat').innerHTML = `<div class="lat-ttl">${s.latestTitle}</div><div class="lat-dt">${s.latestDate}</div>`;
  const badge = document.getElementById('mBadge');
  badge.className = MODE==='live' ? 'mbadge-live' : 'mbadge-demo';
  badge.textContent = MODE==='live' ? 'Live AI' : 'Demo';
  document.getElementById('overlay').classList.add('open');
  if (MODE==='demo' && s.sum) {
    document.getElementById('mSum').innerHTML = `<p>${s.sum}</p>`;
  } else if (MODE==='live') {
    liveSummary(s);
  } else {
    document.getElementById('mSum').innerHTML = `<div class="sum-gen"><span class="spin">⟳</span>No demo summary available.</div>`;
  }
}

async function liveSummary(s) {
  document.getElementById('mSum').innerHTML = `<div class="sum-gen"><span class="spin">⟳</span>Generating…</div>`;
  try {
    const r = await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:300,
        messages:[{role:'user',content:`Write a 3-sentence performance summary for a content site called "${s.name}" (${s.domain}), niche: ${s.cat}. It has ${s.arts} articles. Latest article: "${s.latestTitle}". 7-day traffic: ${s.t7.reduce((a,b)=>a+b,0)} views. Status: ${s.status}. Be specific and actionable. No intro fluff.`}]})});
    const d = await r.json();
    const t = d?.content?.[0]?.text || d?.error?.message || 'Could not generate summary.';
    document.getElementById('mSum').innerHTML = `<p>${t}</p>`;
  } catch(e) {
    document.getElementById('mSum').innerHTML = `<p style="color:var(--text3)">Error: ${e.message}</p>`;
  }
}

function closeOverlay() { document.getElementById('overlay').classList.remove('open'); }
function maybeClose(e)  { if(e.target===document.getElementById('overlay')) closeOverlay(); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeOverlay(); });

// ── live fetch ────────────────────────────────────
async function fetchLive() {
  const cfgR = await fetch('/api/config').catch(()=>null);
  if (!cfgR||!cfgR.ok) { alert('Server not reachable. Falling back to demo data.'); setMode('demo'); return null; }
  const cfg = await cfgR.json();
  const tok = localStorage.getItem('ghToken')||'';
  return Promise.all((cfg.sites||[]).map(async s=>{
    let arts=0, latest='unknown', latestDate='—', latestTitle='—';
    if (tok && s.repo && !s.repo.includes('YOUR_')) {
      try {
        const pr = await fetch(`/api/github/repos/${s.repo}/contents/_posts`,{headers:{'X-GH-Token':tok}});
        if (pr.ok) {
          const posts = await pr.json();
          if (Array.isArray(posts)) {
            arts = posts.length;
            const srt = posts.sort((a,b)=>b.name.localeCompare(a.name));
            if (srt[0]) {
              latestTitle = srt[0].name.replace(/^\d{4}-\d{2}-\d{2}-/,'').replace(/\.md$/,'').replace(/-/g,' ');
              latestTitle = latestTitle[0].toUpperCase()+latestTitle.slice(1);
              const m = srt[0].name.match(/^(\d{4}-\d{2}-\d{2})/);
              if (m) { latestDate=m[1]; latest=m[1]; }
            }
          }
        }
      } catch(_){}
    }
    const colors = ['blue','green','purple','amber','pink','red'];
    const t7 = Array.from({length:7},()=>Math.floor(Math.random()*300+50));
    return {
      id:s.id, name:s.id.split('-').map(w=>w[0].toUpperCase()+w.slice(1)).join(' '),
      domain:s.domain||s.id+'.io', cat:s.category||'—',
      status:s.active?(s.warming?.phase==='new'?'warming':'active'):'paused',
      arts, latest, latestDate, latestTitle,
      t7, trend:'—', tdir:'flat', sum:null,
      color:colors[Math.abs(s.id.split('').reduce((a,c)=>a+c.charCodeAt(0),0))%6]
    };
  }));
}

// ── mode / refresh ────────────────────────────────
function setMode(m) {
  MODE = m;
  document.getElementById('btnDemo').className = 'mode-btn'+(m==='demo'?' demo-on':'');
  document.getElementById('btnLive').className = 'mode-btn'+(m==='live'?' live-on':'');
  refresh();
}

async function refresh() {
  const ic = document.getElementById('refIc');
  ic.className='spin'; ic.textContent='↻';
  if (MODE==='demo') { allSites=DEMO; }
  else {
    try { allSites = await fetchLive() || DEMO; }
    catch(e){ allSites=DEMO; console.warn('Live fetch failed:',e); }
  }
  renderHero(allSites);
  applyFilters();
  document.getElementById('lastUpd').textContent =
    `Updated ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  setTimeout(()=>{ ic.className=''; ic.textContent='↻'; }, 700);
}

refresh();
