name: Daily Content Publisher

on:
  schedule:
    - cron: '0 8 * * *'    # 8am UTC every day
  workflow_dispatch:         # Run manually from GitHub Actions tab
    inputs:
      historical_bulk:
        description: 'Post N historical backdated articles per site in this run (0 = normal daily run)'
        required: false
        default: '0'

# Only one daily publish run at a time. A manual dispatch while a scheduled run
# is in flight will queue (not cancel) the new run, preventing duplicate posts.
concurrency:
  group: daily-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run content bot
        run: python bot.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          BREVO_API_KEY:     ${{ secrets.BREVO_API_KEY }}
          HISTORICAL_BULK:   ${{ github.event.inputs.historical_bulk || '0' }}
