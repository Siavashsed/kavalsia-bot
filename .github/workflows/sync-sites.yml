name: Sync Sites

# Auto-propagates homepage changes to every site's static pages and articles.
# Triggers whenever a homepage template (or the shell machinery) changes.

# MANUAL-ONLY: the push-trigger was removed because deploys are driven from the
# dashboard's Publish panel, and the auto-firing version requires a NETWORK_PAT
# secret to push cross-repo. Run this workflow by hand from the Actions tab
# when you actually want to re-sync the network from the bot repo.
on:
  workflow_dispatch:
    inputs:
      only:
        description: 'Comma-separated site stems (blank = all)'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Propagate homepage changes
        # NETWORK_PAT must be a Personal Access Token with 'repo' scope that can
        # write to every Siavashsed/<site> repo (the built-in GITHUB_TOKEN only
        # has access to this repo, so a PAT is required for cross-repo pushes).
        run: python3 sync.py "${{ secrets.NETWORK_PAT }}" --only "${{ github.event.inputs.only }}"
